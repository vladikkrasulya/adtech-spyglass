<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Kyivtech Spyglass">
  <!-- Classic Yellow-Black branding (palette tokens: --accent #FFCC00, --accent-ink #181818).
       2026-05-06: rolled back from the brief Indigo redesign experiment to the
       original Dewalt-style identity that fits Spyglass's hacker aesthetic.
       The "K" wordmark is the umbrella Kyivtech identity — Spyglass inherits
       it as a sub-property. -->
  <rect width="32" height="32" rx="8" fill="#FFCC00"/>
  <text x="50%" y="65%"
        text-anchor="middle"
        font-family="Onest, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="20"
        font-weight="700"
        fill="#181818">K</text>
</svg>
