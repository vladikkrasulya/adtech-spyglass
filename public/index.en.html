    <script>
      (function () {
        try {
          var K = 'kt-theme';
          var mq = matchMedia('(prefers-color-scheme: dark)');
          function get() {
            try {
              return localStorage.getItem(K);
            } catch (e) {
              return null;
            }
          }
          function set(v) {
            try {
              v === null ? localStorage.removeItem(K) : localStorage.setItem(K, v);
            } catch (e) {}
          }
          function eff() {
            var s = get();
            return s === 'light' || s === 'dark' ? s : mq.matches ? 'dark' : 'light';
          }
          function apply() {
            document.documentElement.setAttribute('data-theme', eff());
            var b = document.querySelector('.kt-theme-toggle');
            if (b) {
              var s = get();
              b.textContent = s === null ? '◐' : s === 'dark' ? '☀' : '☾';
              b.title =
                s === null
                  ? 'theme: auto · click → light'
                  : s === 'light'
                    ? 'theme: light · click → dark'
                    : 'theme: dark · click → auto';
            }
          }
          apply();
          if (mq.addEventListener) mq.addEventListener('change', apply);
          else if (mq.addListener) mq.addListener(apply);
          function inject() {
            var btns = document.querySelectorAll('.kt-theme-toggle');
            // If a "real" (in-template) button now exists, demote any
            // floating fallback we may have created earlier so the user
            // only ever sees one toggle. Inspector template arrives async
            // via mount() and fires kt:inspector-ready → this re-runs.
            var hasReal = Array.prototype.some.call(btns, function (b) {
              return b.dataset.fallback !== '1';
            });
            if (hasReal) {
              Array.prototype.forEach.call(btns, function (b) {
                if (b.dataset.fallback === '1') b.remove();
              });
              btns = document.querySelectorAll('.kt-theme-toggle');
            }
            if (!btns.length) {
              // Fallback for surfaces without their own theme toggle in
              // markup (e.g. /about). Tagged data-fallback so a later
              // inject() pass can demote it if a real one arrives.
              var b = document.createElement('button');
              b.className = 'kt-theme-toggle';
              b.type = 'button';
              b.dataset.fallback = '1';
              b.setAttribute('aria-label', 'Toggle theme');
              document.body.appendChild(b);
              btns = [b];
            }
            Array.prototype.forEach.call(btns, function (b) {
              if (b.dataset.themeBound) return;
              b.addEventListener('click', function () {
                var s = get();
                set(s === null ? 'light' : s === 'light' ? 'dark' : null);
                apply();
              });
              b.dataset.themeBound = '1';
            });
            apply();
          }
          if (document.readyState === 'loading')
            document.addEventListener('DOMContentLoaded', inject);
          else inject();
          // Re-run when inspector module finishes injecting its template
          // — that's when the in-header .kt-theme-toggle button appears.
          window.addEventListener('kt:inspector-ready', inject);
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var LANG = 'en';
          document.documentElement.setAttribute('data-lang', LANG);
          try {
            localStorage.setItem('kt-lang', LANG);
          } catch (e) {}
        } catch (e) {}
      })();
    </script>
    <!-- Embed-mode flag: when ?embed=1 is in the URL, strip chrome via
         CSS gated on [data-embed='1']. Set BEFORE first paint to avoid FOUC. -->
    <script>
      (function () {
        try {
          if (new URLSearchParams(location.search).has('embed')) {
            document.documentElement.setAttribute('data-embed', '1');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      /* ============================================================
   2026-05-06: Indigo redesign rolled back to classic Yellow-Black
   palette (Dewalt-style). All colour roles now flow from
   /design-system.css :root + [data-theme="dark"] tokens directly —
   no shell-level palette overrides. The Indigo override block, the
   bottom-anchored gradient glow, and any accent-specific decorative
   rules were removed surgically. Scrollbar + selection rules below
   stay because they're token-driven (var(--border-strong) etc.) and
   recolour automatically on the new palette.
   ============================================================ */

      /* Scrollbars — palette-aligned in BOTH themes. Width identical across
         themes (10px) so theme toggle never reflows content. */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--border-strong) transparent;
      }
      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      *::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 6px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: var(--text-dim);
        background-clip: content-box;
      }
      *::-webkit-scrollbar-corner {
        background: transparent;
      }

      /* Text selection — accent-tinted, contrast-preserved. */
      ::selection {
        background: var(--selection-bg);
        color: var(--text);
      }
      ::-moz-selection {
        background: var(--selection-bg);
        color: var(--text);
      }
    </style>

    <!-- Inspector module owns its own template + CSS — see
         /modules/inspector/{index.js,template.${lang}.html,inspector.css}.
         Shell provides only base tokens (above) + the mount root.
         The .workbench grid sits ON #app-root (not body) so the grid
         items inside the injected template are direct grid children. -->
    <div id="app-root" class="workbench"></div>
    <script src="/version.js?v=1"></script>
    <script src="/spyglass-crypto.js?v=1"></script>
    <script src="/i18n.js?v=20"></script>
    <script src="/lang-switch.js?v=1"></script>
    <script type="module">
      // Inspector module boot (Phase C-2/C-3 — the module fetches its
      // template + CSS itself; shell stays locale-agnostic markup-wise).
      import inspectorModule from '/modules/inspector/index.js?v=5';
      import { register, activate } from '/core/registry.js';
      register(inspectorModule);
      try {
        await activate('inspector', document.getElementById('app-root'));
      } catch (err) {
        console.error('[shell] inspector mount failed', err);
      }
    </script>
    <!-- Classic <script> utilities. They wait for `kt:inspector-ready`
         (emitted by inspector mount() once template DOM is injected)
         before binding to inspector-owned elements. -->
    <script src="/shortcuts.js?v=1"></script>
    <script src="/export.js?v=1"></script>
    <script src="/share.js?v=3"></script>
    <script src="/embed.js?v=1"></script>
    <script src="/modules/behavior/index.js?v=4"></script>
    <!-- Phase 7a — Spyglass Intelligence (Discovery Mode). Loads in order:
         storage → banner → observer → entry. All four expose IIFE-scoped
         globals (SpyglassIntelStorage / SpyglassIntelBanner /
         SpyglassIntelObserver / SpyglassIntel) and are no-ops when
         IndexedDB is unavailable (private mode etc.). -->
    <script src="/modules/intel/storage.js?v=3"></script>
    <script src="/modules/intel/banner.js?v=2"></script>
    <script src="/modules/intel/observer.js?v=2"></script>
    <script src="/modules/intel/builder.js?v=2"></script>
    <script src="/modules/intel/index.js?v=3"></script>
  </body>
