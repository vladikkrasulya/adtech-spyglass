<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Spyglass · Live RTB Stream</title>
    <meta
      name="description"
      content="Public RTB observability feed — live OpenRTB BidResponse specimens with validator + behavior probe overlays. No login. No tracking. Source code MIT."
    />
    <link rel="canonical" href="https://spyglass.kyivtech.com.ua/stream" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kyiv Tech" />
    <meta property="og:title" content="Spyglass · Live RTB Stream" />
    <meta
      property="og:description"
      content="Public RTB observability feed — live OpenRTB BidResponse specimens with validator + behavior probe overlays."
    />
    <meta property="og:url" content="https://spyglass.kyivtech.com.ua/stream" />
    <meta property="og:image" content="https://spyglass.kyivtech.com.ua/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/design-system.css" />
    <style>
      /* ============================================================
         Shell-level CSS only — page palette, glow, scrollbars,
         selection. Module-specific layout / components live in
         /modules/stream/stream.css and load dynamically on mount.
         ============================================================ */

      /* Palette 1 (Monolith Indigo) — pinned for the stream surface.
         Override of design-system.css :root tokens via cascade. */
      :root {
        --bg: #f7f8fa;
        --bg-2: #eef0f4;
        --surface: #ffffff;
        --surface-ink: #0f1525;
        --surface-ink-2: #1a2138;
        --text: #0f1525;
        --text-muted: #515a6e;
        --text-dim: #8a93a6;
        --text-inv: #fafafa;
        --text-on-accent: #ffffff;
        --border: rgba(15, 21, 37, 0.08);
        --border-strong: rgba(15, 21, 37, 0.16);
        --accent: #3e63dd;
        --accent-hover: #5573e5;
        --accent-soft: rgba(62, 99, 221, 0.1);
        --accent-ink: #0f1525;
        --accent-secondary: #5e6ad2;
        --selection-bg: rgba(62, 99, 221, 0.3);
      }
      [data-theme='dark'] {
        --bg: #0b0d14;
        --bg-2: #12151f;
        --surface: #12151f;
        --surface-ink: #181c28;
        --surface-ink-2: #232838;
        --text: #e6e9f2;
        --text-muted: #9098ad;
        --text-dim: #5c6479;
        --text-inv: #0b0d14;
        --text-on-accent: #ffffff;
        --border: rgba(255, 255, 255, 0.06);
        --border-strong: rgba(255, 255, 255, 0.12);
        --accent: #7c8cff;
        --accent-hover: #9aa5ff;
        --accent-soft: rgba(124, 140, 255, 0.14);
        --accent-ink: #e6e9f2;
        --accent-secondary: #5e6ad2;
        --selection-bg: rgba(124, 140, 255, 0.35);
      }

      /* Bottom-anchored glow (Gemini-style, two corners). */
      body {
        background: transparent !important;
        position: relative;
      }
      body::before,
      body::after {
        content: '';
        position: fixed;
        bottom: 0;
        width: 60vw;
        height: 55vh;
        pointer-events: none;
        z-index: -1;
      }
      body::before {
        left: -10vw;
      }
      body::after {
        right: -10vw;
      }
      :root body::before {
        background: radial-gradient(
          ellipse at bottom left,
          rgba(62, 99, 221, 0.05),
          transparent 65%
        );
      }
      :root body::after {
        background: radial-gradient(
          ellipse at bottom right,
          rgba(94, 106, 210, 0.04),
          transparent 70%
        );
      }
      [data-theme='dark'] body::before {
        background: radial-gradient(
          ellipse at bottom left,
          rgba(124, 140, 255, 0.22),
          transparent 65%
        );
      }
      [data-theme='dark'] body::after {
        background: radial-gradient(
          ellipse at bottom right,
          rgba(94, 106, 210, 0.16),
          transparent 70%
        );
      }

      /* Scrollbars, selection — same spec as the playground for
         visual consistency across surfaces. */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--border-strong) transparent;
      }
      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      *::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 6px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: var(--text-dim);
        background-clip: content-box;
      }
      *::-webkit-scrollbar-corner {
        background: transparent;
      }
      ::selection {
        background: var(--selection-bg);
        color: var(--text);
      }
      ::-moz-selection {
        background: var(--selection-bg);
        color: var(--text);
      }

      /* Reset + app-root container. Module's stream.css turns
         #app-root into a grid; shell only sets sizing. */
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: var(--font-body, 'Onest', system-ui, sans-serif);
        color: var(--text);
        overflow: hidden;
      }
      #app-root {
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app-root"></div>

    <script type="module">
      // Thin shell. Boots the registry, registers the stream module,
      // activates it for the current route. The registry handles
      // ctx, lifecycle, cleanup; the module owns everything inside
      // #app-root.
      import streamModule from '/modules/stream/index.js';
      import { register, activate } from '/core/registry.js';
      import { match } from '/core/router.js';

      register(streamModule);

      // Match the URL against registered routes; fall back to stream
      // when nothing matches (this shell only knows one module today).
      const id = match(location.pathname) || 'stream';
      const root = document.getElementById('app-root');
      try {
        await activate(id, root);
      } catch (err) {
        console.error('[shell] mount failed', err);
        root.innerHTML =
          '<div style="padding:48px;color:var(--text-dim);font-family:var(--font-body)">' +
          'Failed to load module — see console.</div>';
      }
    </script>
  </body>
</html>
