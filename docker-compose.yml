services:
  spyglass:
    container_name: adtech-spyglass
    # ── Immutable image (v1.1.5+) ──────────────────────────────────────────
    # The running container is a self-contained snapshot: ALL source (server.js,
    # modules/, packages/, public/, samples/, lib/, content/posts seed) is baked
    # into the image at build time. No source bind-mounts — a host edit can no
    # longer change production out of band, and a rollback image fully restores
    # a prior release. See docs/OPERATIONS.md and tests/immutable-image.test.js.
    #
    # `image:` pins an explicit tag so deploy/rollback select an exact build.
    # SPYGLASS_TAG is written to the gitignored .env by scripts/deploy.sh and is
    # auto-read by compose, so a plain `docker compose up -d` (or a reboot)
    # starts the SAME image. The `:?` guard forbids a silent fall back to a
    # `local`/`dev` image in production.
    image: adtech-spyglass:${SPYGLASS_TAG:?SPYGLASS_TAG must be set (deploy via scripts/deploy.sh — never a silent local/dev image)}
    build:
      # Relative context so the image is reproducible from any clean checkout
      # (GitHub Actions, a fresh clone) — NOT tied to /srv/DATA/Stacks/...
      context: .
      dockerfile: Dockerfile
      args:
        # BUILD_SHA: short git SHA, surfaced via /api/health.
        # GIT_SHA:   full git SHA, baked as OCI image revision label.
        # APP_VERSION: package.json version, baked as OCI image version label.
        # scripts/deploy.sh computes all three; falls back to 'dev' otherwise.
        BUILD_SHA: ${BUILD_SHA:-dev}
        GIT_SHA: ${GIT_SHA:-dev}
        APP_VERSION: ${APP_VERSION:-dev}
    env_file:
      # Secrets + runtime config (gitignored; .env.example documents the keys).
      # SPYGLASS_TAG also lives here so compose interpolation + plain `up -d`
      # resolve the deployed image tag after a reboot.
      - .env
    environment:
      # On-prem LLM bridge. `http://ollama:11434` resolves via kt-shared →
      # ollama-router → gpu (model alias gemma4-prod, currently gemma4:e4b on
      # vkbox). Fail-open: if ollama is unreachable the AI affordances hide.
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma4-prod
      # Blog content root. Persisted UNDER the existing /data volume (no second
      # mount) and seeded from the repo's content/posts on first deploy. Keeps
      # promoted posts out of the git working tree and out of the image layer.
      - CONTENT_DIR=/data/content-posts
    ports:
      - '127.0.0.1:8090:3000'
    volumes:
      # The ONLY mount: persistent runtime data — SQLite store + blog content
      # (content-posts/). All source AND the vendored design-system.css are baked
      # into the image (see design-system.vendor.json), so the container is fully
      # self-contained; the transitional portal CSS overlay was removed in v1.1.6.
      - /srv/DATA/AppData/adtech-spyglass:/data
    networks:
      - default
      - kt-shared
    # `always` is the NORMAL, base-file policy — a plain `docker compose up -d`
    # (routine ops, manual recovery, a host reboot bringing dockerd back) must
    # keep behaving exactly as documented: it recreates/resumes THIS service with
    # auto-heal, unaffected by anything deploy-specific.
    #
    # scripts/deploy.sh / scripts/rollback.sh do NOT rely on this default while
    # bringing up an UNVERIFIED candidate/rollback image: they additionally pass
    # `-f docker-compose.deploy-transition.yml` (see that file), which overrides
    # this to 'no' for THAT invocation only, then arm `docker update
    # --restart=always` in place ONLY after wait_ready + smoke both pass — so an
    # unverified image is never silently resurrected by Docker's own
    # restart-manager, while every OTHER caller of plain `docker compose up -d`
    # keeps the normal always-restart behavior. See scripts/deploy-lib.sh
    # COMPOSE_TRANSITION_FILES / arm_restart_policy() and docs/OPERATIONS.md.
    restart: always
    healthcheck:
      # IPv4 explicit (alpine resolves "localhost" as ::1 first; app listens IPv4 only).
      test: ['CMD-SHELL', 'wget -qO- --tries=1 --timeout=3 http://127.0.0.1:3000/ > /dev/null']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 768m

networks:
  default:
  kt-shared:
    external: true
