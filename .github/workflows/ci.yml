name: CI

# Runs on pushes to main and on every PR. Mirrors what `npm run ci` does
# locally — Prettier, ESLint, tsc --noEmit, and the node:test suite.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same ref when a new commit lands. No need to
# burn minutes finishing a run for a commit that's already been replaced.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # fetch-depth: 0 — full history, not the default shallow (depth 1) clone.
      # The privacy-floor guard (scripts/deploy-lib.sh) and its tests resolve a
      # historical commit (PRIVACY_BASELINE_SHA, several commits behind any given
      # tip) via `git rev-parse --verify`/`git merge-base --is-ancestor`, which
      # requires that commit's object to be present. A shallow clone doesn't have
      # it, so ancestry resolution fails closed (empty result) — this is what the
      # guard is DESIGNED to do when it can't verify, but it means the guard (and
      # its tests) cannot function at all without full history. The production
      # host's checkout is a persistent `git clone` + `git pull --ff-only`
      # (full history already), so this only needed fixing here in CI.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # better-sqlite3 ships prebuilds for ubuntu-latest, so this is fast.
      # If a prebuild miss ever forces compilation, ubuntu runners already
      # have python3 + build-essential preinstalled.
      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check (JSDoc + tsc --noEmit)
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Docker production smoke
        run: bash scripts/ci-docker-smoke.sh
